name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  backend-lint-test:
    name: Backend — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app/

      - name: Type-check (mypy)
        run: mypy app/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          SUPABASE_URL: "https://placeholder.supabase.co"
          SUPABASE_SERVICE_KEY: "placeholder"
          REDIS_URL: "redis://localhost:6379/0"
          ANTHROPIC_API_KEY: "sk-ant-placeholder"
          ENVIRONMENT: "test"

  # ─────────────────────────────────────────
  frontend-lint-typecheck:
    name: Frontend — lint + type-check + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      # Standard Next.js build validates the app compiles correctly.
      # The Cloudflare-specific build (build:cf) runs only on deploy.
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
          NEXT_PUBLIC_API_URL: "http://localhost:8000"

  # ─────────────────────────────────────────
  deploy-backend:
    name: Deploy backend → Koyeb
    needs: [backend-lint-test, frontend-lint-typecheck]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Koyeb watches the GitHub repo directly (configured in dashboard).
      # This step forces a redeploy via the Koyeb API as a CI-gated trigger,
      # ensuring deployment only happens after tests pass.
      - name: Trigger Koyeb redeploy
        run: |
          curl -sf -X POST "https://app.koyeb.com/v1/services/${{ secrets.KOYEB_SERVICE_ID }}/redeploy" \
            -H "Authorization: Bearer ${{ secrets.KOYEB_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' | jq .

  # ─────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend → Cloudflare Pages
    needs: [backend-lint-test, frontend-lint-typecheck]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      # @opennextjs/cloudflare compiles Next.js App Router to Cloudflare Workers.
      # With nodejs_compat in wrangler.toml, all Node.js built-ins are available —
      # no per-route `export const runtime = 'edge'` needed.
      - name: Build for Cloudflare (OpenNext)
        run: npm run build:cf
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .open-next/assets --project-name=mifcg-frontend --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
