# Koyeb service definition — import via `koyeb services create --file koyeb.yaml`
# Or configure equivalent settings in the Koyeb dashboard.
#
# Free tier: 2 nano instances (0.1 vCPU, 512MB RAM each), no spin-down,
# global edge (Cloudflare-backed routing). Nearest region to Malaysia: fra (Frankfurt)
# or was (Washington) — Koyeb auto-routes to lowest-latency.

name: mifcg-api
type: WEB

definition:
  name: mifcg-api
  type: WEB
  git:
    repository: github.com/timothylee58/MIFCG-AI
    branch: main
    workdir: backend
    buildpack:
      build_command: ""
      run_command: "uvicorn app.main:app --host 0.0.0.0 --port 8000"
  instance_types:
    - type: nano          # free tier
  ports:
    - port: 8000
      protocol: http
  routes:
    - path: /
      port: 8000
  health_checks:
    - grace_period: 10
      interval: 30
      restart_limit: 3
      path: /health
      port: 8000
      protocol: http
  env:
    - key: ENVIRONMENT
      value: production
    - key: SUPABASE_URL
      secret: SUPABASE_URL
    - key: SUPABASE_SERVICE_KEY
      secret: SUPABASE_SERVICE_KEY
    - key: REDIS_URL
      secret: REDIS_URL
    - key: ANTHROPIC_API_KEY
      secret: ANTHROPIC_API_KEY
    - key: ALLOWED_ORIGINS
      secret: ALLOWED_ORIGINS
