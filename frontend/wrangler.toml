# Cloudflare Pages — @opennextjs/cloudflare
#
# nodejs_compat flag is the key workaround:
# - Enables Node.js built-in modules (crypto, stream, buffer, etc.) in Workers
# - Means Next.js server components do NOT need `export const runtime = 'edge'`
# - Supabase SSR, LangChain, and most npm packages work without modification
#
# @opennextjs/cloudflare compiles Next.js App Router to Cloudflare Workers format,
# wrapping each route in a Worker that respects the nodejs_compat runtime.

name                    = "mifcg-frontend"
compatibility_date      = "2025-01-01"
compatibility_flags     = ["nodejs_compat"]
pages_build_output_dir  = ".open-next/assets"

[vars]
NEXT_PUBLIC_API_URL = "https://mifcg-api.koyeb.app"
